<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Turf Wars</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    overflow: hidden;
    user-select: none;
  }

  /* ── TURF NAME BADGE (top-CENTER) ── */
  #turf-badge {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
  }

  #turf-badge.visible { display: flex; }

  .badge-main {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, rgba(10,10,20,0.88) 0%, rgba(20,10,40,0.88) 100%);
    border: 1px solid rgba(160, 60, 255, 0.45);
    border-bottom: 3px solid #a03cff;
    border-radius: 0px;
    padding: 8px 18px;
    box-shadow: 0 4px 24px rgba(160,60,255,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .badge-icon {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .badge-icon-svg {
    width: 18px;
    height: 18px;
    color: #a03cff;
    flex-shrink: 0;
    filter: drop-shadow(0 0 6px rgba(160,60,255,0.5));
  }

  .badge-text {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .badge-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a03cff;
    line-height: 1;
  }

  .badge-name {
    font-size: 14px;
    font-weight: 600;
    color: #f0e8ff;
    line-height: 1.3;
    text-shadow: 0 0 12px rgba(160,60,255,0.6);
  }

  .badge-timer {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(10,10,20,0.75);
    border: 1px solid rgba(160,60,255,0.2);
    border-radius: 0px;
    padding: 4px 14px;
  }

  .timer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #a03cff;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(160,60,255,0.7); }
    50%       { opacity: 0.6; box-shadow: 0 0 0 4px rgba(160,60,255,0); }
  }

  .timer-value {
    font-size: 14px;
    font-weight: 700;
    color: #e8d8ff;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }

  /* Warning state — orange + shake */
  .timer-value.warning {
    color: #ff6b35;
    animation: timerShake 0.4s ease-in-out infinite;
  }

  .timer-dot.warning-dot {
    background: #ff6b35;
    animation: pulse-red 1s ease-in-out infinite;
  }

  @keyframes timerShake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-3px) rotate(-1deg); }
    40%  { transform: translateX(3px) rotate(1deg); }
    60%  { transform: translateX(-2px) rotate(-0.5deg); }
    80%  { transform: translateX(2px) rotate(0.5deg); }
    100% { transform: translateX(0); }
  }

  @keyframes pulse-red {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,107,53,0.7); }
    50%       { opacity: 0.5; box-shadow: 0 0 0 5px rgba(255,107,53,0); }
  }

  /* ── KEYBIND HINTS (top-left)
     To adjust position: change `top` and `left` values below  ── */
  #turf-hints {
    position: fixed;
    top: 300px;   /* ← move up/down here */
    left: 29px;  /* ← move left/right here — matches session-overlay's left edge */
    display: none;
    flex-direction: column;
    gap: 4px;
    pointer-events: none;
  }

  #turf-hints.visible { display: flex; }

  .hint-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, rgba(10,10,20,0.88) 0%, rgba(20,10,40,0.88) 100%);
    border: 1px solid rgba(160,60,255,0.25);
    border-left: 3px solid #a03cff;
    border-radius: 0px;
    padding: 5px 10px 5px 8px;
  }

  .hint-key {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #a03cff;
    background: rgba(160,60,255,0.12);
    border: 1px solid rgba(160,60,255,0.3);
    border-radius: 0px;
    padding: 2px 6px;
    min-width: 40px;
    width: 40px;
    text-align: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  .hint-label {
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.3px;
  }

  /* ============================================================
     ARSENAL -- full-screen weapon shop overlay
     Replaces the old top-left popover. Same purple/black/green
     token system as the rest of the HUD (badge, kill feed), just
     scaled up into a full takeover since players make real money
     decisions here and a corner popover undersold that.
     ============================================================ */

  #weapon-menu {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    background:
      radial-gradient(ellipse at top, rgba(100,20,200,0.10) 0%, transparent 55%),
      linear-gradient(180deg, rgba(10,6,20,0.55) 0%, rgba(8,5,16,0.62) 100%);
    pointer-events: auto;
    animation: arsenalFadeIn 0.16s ease-out;
  }

  @keyframes arsenalFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  #weapon-menu.visible { display: flex; }

  /* ── top bar: identity + live balance ── */
  .arsenal-topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 36px;
    border-bottom: 1px solid rgba(160,60,255,0.18);
    background: linear-gradient(90deg, rgba(160,60,255,0.08) 0%, transparent 60%);
  }

  .menu-title-group {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .menu-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, #a03cff, #6014c8);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 16px rgba(160,60,255,0.45);
    flex-shrink: 0;
  }

  .menu-icon img {
    width: 22px;
    height: 22px;
    object-fit: contain;
    filter: invert(1) brightness(1.1);
  }

  .menu-title { display: flex; flex-direction: column; }

  .menu-title-text {
    font-size: 19px;
    font-weight: 700;
    color: #f0e8ff;
    letter-spacing: 0.5px;
  }

  .menu-subtitle {
    font-size: 10px;
    color: rgba(160,60,255,0.8);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .arsenal-topbar-right {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .balance-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(60,255,160,0.08);
    border: 1px solid rgba(60,255,160,0.3);
    border-radius: 10px;
    padding: 9px 18px;
  }

  .balance-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(111,255,176,0.7);
  }

  .balance-value {
    font-size: 18px;
    font-weight: 800;
    color: #6fffb0;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
    transition: color 0.25s ease;
  }

  .balance-value.flash-down { color: #ff8a6b; }

  .menu-close-btn {
    width: 38px;
    height: 38px;
    border-radius: 9px;
    border: 1px solid rgba(160,60,255,0.25);
    background: rgba(160,60,255,0.06);
    color: rgba(220,210,240,0.7);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s ease;
  }

  .menu-close-btn:hover {
    background: rgba(160,60,255,0.16);
    border-color: rgba(160,60,255,0.5);
    color: #f0e8ff;
  }

  /* ── body: category rail (left) + weapon grid (right) ── */
  .arsenal-body {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .arsenal-rail {
    flex-shrink: 0;
    width: 200px;
    border-right: 1px solid rgba(160,60,255,0.15);
    padding: 18px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: rgba(0,0,0,0.18);
  }

  .menu-tab {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(200,180,255,0.45);
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 8px;
    background: none;
    transition: all 0.14s ease;
    text-align: left;
  }

  .menu-tab:hover  { color: rgba(200,180,255,0.8); background: rgba(160,60,255,0.06); }
  .menu-tab.active {
    color: #f0e8ff;
    background: rgba(160,60,255,0.14);
    border-color: rgba(160,60,255,0.4);
  }

  .tab-icon-img {
    width: 16px;
    height: 16px;
    object-fit: contain;
    flex-shrink: 0;
    filter: invert(1) brightness(0.9);
    opacity: 0.45;
    transition: opacity 0.14s ease;
  }
  .menu-tab:hover .tab-icon-img  { opacity: 0.8; }
  .menu-tab.active .tab-icon-img {
    opacity: 1;
    filter: invert(1) brightness(1.1) drop-shadow(0 0 3px rgba(160,60,255,0.6));
  }

  /* ── weapon grid ── */
  .arsenal-grid-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 26px 36px 40px;
    scrollbar-width: thin;
    scrollbar-color: rgba(160,60,255,0.3) transparent;
  }

  .arsenal-grid-wrap::-webkit-scrollbar       { width: 6px; }
  .arsenal-grid-wrap::-webkit-scrollbar-track { background: transparent; }
  .arsenal-grid-wrap::-webkit-scrollbar-thumb { background: rgba(160,60,255,0.3); border-radius: 3px; }

  .weapon-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .weapon-btn {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid rgba(160,60,255,0.16);
    background: linear-gradient(150deg, rgba(20,12,36,0.6) 0%, rgba(12,8,22,0.6) 100%);
    cursor: pointer;
    transition: all 0.14s ease;
    text-align: left;
    position: relative;
    overflow: hidden;
  }

  .weapon-btn:hover {
    background: linear-gradient(150deg, rgba(160,60,255,0.14) 0%, rgba(20,12,36,0.7) 100%);
    border-color: rgba(160,60,255,0.45);
    transform: translateY(-1px);
  }

  .weapon-btn.active-weapon {
    background: linear-gradient(150deg, rgba(160,60,255,0.22) 0%, rgba(20,12,36,0.7) 100%);
    border-color: #a03cff;
    box-shadow: 0 0 0 1px rgba(160,60,255,0.3), 0 4px 20px rgba(160,60,255,0.2);
  }

  .weapon-icon-slot {
    width: 100%;
    height: 64px;
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .weapon-icon-img {
    width: 36px;
    height: 36px;
    object-fit: contain;
    filter: invert(1) brightness(1.05) drop-shadow(0 0 4px rgba(160,60,255,0.45));
    transition: opacity 0.15s ease, filter 0.15s ease;
  }

  .weapon-btn.locked-weapon .weapon-icon-img {
    opacity: 0.25;
    filter: invert(1) brightness(0.55) grayscale(1);
  }

  .lock-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 19px;
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7));
    pointer-events: none;
  }

  .weapon-meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .weapon-name {
    font-size: 13px;
    font-weight: 600;
    color: rgba(220,210,240,0.9);
    letter-spacing: 0.2px;
    line-height: 1.3;
  }

  .weapon-btn.active-weapon .weapon-name { color: #e8d8ff; font-weight: 700; }
  .weapon-btn.locked-weapon .weapon-name { color: #a89cc0; }

  .weapon-active-badge {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #a03cff;
    background: rgba(160,60,255,0.15);
    border: 1px solid rgba(160,60,255,0.3);
    border-radius: 4px;
    padding: 3px 6px;
    flex-shrink: 0;
  }

  .weapon-price {
    font-size: 12px;
    font-weight: 700;
    color: #6fffb0;
    background: rgba(60,255,160,0.1);
    border: 1px solid rgba(60,255,160,0.28);
    border-radius: 5px;
    padding: 3px 8px;
    flex-shrink: 0;
  }

  .weapon-price.unaffordable {
    color: #ff8a6b;
    background: rgba(255,107,53,0.1);
    border-color: rgba(255,107,53,0.3);
  }

  .cat-empty-hint {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: rgba(160,60,255,0.4);
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  /* ── bottom status strip ── */
  .arsenal-footer {
    flex-shrink: 0;
    padding: 12px 36px;
    border-top: 1px solid rgba(160,60,255,0.12);
    background: rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-hint   { font-size: 10px; color: rgba(200,180,255,0.35); letter-spacing: 0.5px; }
  .footer-status { font-size: 10px; color: rgba(160,60,255,0.65);  font-weight: 600; letter-spacing: 0.5px; }

  /* ============================================================
     PURCHASE CONFIRM MODAL
     ============================================================ */

  #confirm-modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    z-index: 10000;
  }

  #confirm-modal.visible { display: flex; }

  .confirm-card {
    width: 360px;
    border-radius: 14px;
    background: linear-gradient(165deg, rgba(20,12,36,0.97) 0%, rgba(10,6,18,0.98) 100%);
    border: 1px solid rgba(160,60,255,0.4);
    box-shadow: 0 16px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(160,60,255,0.12);
    animation: confirmPopIn 0.16s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
  }

  @keyframes confirmPopIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  .confirm-header {
    padding: 20px 22px 14px;
    border-bottom: 1px solid rgba(160,60,255,0.15);
  }

  .confirm-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(160,60,255,0.7);
    margin-bottom: 6px;
  }

  .confirm-weapon-name {
    font-size: 18px;
    font-weight: 700;
    color: #f0e8ff;
  }

  .confirm-body {
    padding: 16px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .confirm-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }

  .confirm-row-label { color: rgba(200,180,255,0.55); letter-spacing: 0.3px; }
  .confirm-row-value { font-weight: 700; color: #e8d8ff; font-variant-numeric: tabular-nums; }
  .confirm-row-value.price   { color: #6fffb0; }
  .confirm-row-value.deficit { color: #ff6b6b; }

  .confirm-divider {
    height: 1px;
    background: rgba(160,60,255,0.12);
    margin: 2px 0;
  }

  .confirm-warning {
    font-size: 11px;
    color: #ff8a6b;
    background: rgba(255,107,53,0.08);
    border: 1px solid rgba(255,107,53,0.25);
    border-radius: 6px;
    padding: 8px 10px;
    line-height: 1.4;
  }

  .confirm-actions {
    display: flex;
    gap: 10px;
    padding: 16px 22px 20px;
  }

  .confirm-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 12px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s ease;
    letter-spacing: 0.3px;
  }

  .confirm-btn-cancel {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.1);
    color: rgba(220,210,240,0.7);
  }

  .confirm-btn-cancel:hover {
    background: rgba(255,255,255,0.08);
    color: #f0e8ff;
  }

  .confirm-btn-confirm {
    background: linear-gradient(135deg, #2fbd7a, #1a8a55);
    color: #ffffff;
    box-shadow: 0 2px 14px rgba(60,255,160,0.25);
  }

  .confirm-btn-confirm:hover {
    box-shadow: 0 2px 20px rgba(60,255,160,0.4);
    transform: translateY(-1px);
  }

  .confirm-btn-confirm:disabled,
  .confirm-btn-confirm.disabled {
    background: linear-gradient(135deg, #555, #333);
    box-shadow: none;
    cursor: not-allowed;
    opacity: 0.6;
  }

  .confirm-btn-icon { font-size: 14px; }

  /* ── KILL FEED (top-right) ── */
  #kill-feed {
    position: fixed;
    top: 18px;
    right: 18px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    pointer-events: none;
    z-index: 9999;
  }

  .kill-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, rgba(10,10,20,0.92) 0%, rgba(20,10,40,0.92) 100%);
    border: 1px solid rgba(160,60,255,0.35);
    border-right: 3px solid #a03cff;
    border-radius: 0px;
    padding: 6px 12px;
    box-shadow: 0 4px 16px rgba(160,60,255,0.15);
    animation: killSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), killFadeOut 0.4s ease-in 4.5s forwards;
    min-width: 220px;
    justify-content: center;
  }

  @keyframes killSlideIn {
    from { opacity: 0; transform: translateX(40px) scale(0.9); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }

  @keyframes killFadeOut {
    to { opacity: 0; transform: translateX(20px) scale(0.95); }
  }

  .kill-killer {
    font-size: 12px;
    font-weight: 700;
    color: #a03cff;
    text-shadow: 0 0 8px rgba(160,60,255,0.5);
  }

  .kill-weapon-img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    filter: invert(1) brightness(1.05) drop-shadow(0 0 4px rgba(160,60,255,0.5));
    flex-shrink: 0;
  }

  .kill-victim {
    font-size: 12px;
    font-weight: 600;
    color: #ff6b6b;
    text-shadow: 0 0 8px rgba(255,107,107,0.4);
  }

  .kill-headshot {
    font-size: 12px;
    color: #ff6b35;
    margin-left: 2px;
  }

  /* ── CASH HUD (middle-right, visible during gameplay) ── */
  #cash-hud {
    position: fixed;
    top: 50%;
    right: 18px;
    transform: translateY(-50%);
    display: none;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    pointer-events: none;
    z-index: 9998;
  }

  #cash-hud.visible { display: flex; }

  .cash-hud-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, rgba(10,10,20,0.82) 0%, rgba(20,10,40,0.82) 100%);
    border: 1px solid rgba(60,255,160,0.35);
    border-right: 3px solid #2fbd7a;
    border-radius: 0px;
    padding: 8px 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    position: relative;
    transition: box-shadow 0.25s ease, border-color 0.25s ease;
    animation: none;
  }

  .cash-hud-pill.pulse-up {
    animation: cashPulseUp 0.5s ease;
    border-right-color: #6fffb0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 22px rgba(60,255,160,0.5);
  }

  .cash-hud-pill.pulse-down {
    animation: cashPulseDown 0.5s ease;
    border-right-color: #ff6b35;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 22px rgba(255,107,53,0.5);
  }

  @keyframes cashPulseUp {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes cashPulseDown {
    0%   { transform: scale(1); }
    25%  { transform: scale(0.96) translateX(-2px); }
    50%  { transform: scale(0.96) translateX(2px); }
    75%  { transform: scale(0.98) translateX(-1px); }
    100% { transform: scale(1) translateX(0); }
  }

  .cash-hud-icon-svg {
    width: 16px;
    height: 16px;
    color: #6fffb0;
    flex-shrink: 0;
    filter: drop-shadow(0 0 4px rgba(60,255,160,0.4));
    transition: color 0.25s ease, filter 0.25s ease;
  }

  .cash-hud-pill.pulse-down .cash-hud-icon-svg {
    color: #ff8a6b;
    filter: drop-shadow(0 0 4px rgba(255,107,53,0.4));
  }

  .cash-hud-text { display: flex; flex-direction: column; align-items: flex-end; }

  .cash-hud-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(111,255,176,0.7);
    line-height: 1;
  }

  .cash-hud-value {
    font-size: 15px;
    font-weight: 800;
    color: #6fffb0;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 10px rgba(60,255,160,0.4);
    transition: color 0.25s ease;
    display: inline-block;
  }

  .cash-hud-value.flash-down { color: #ff8a6b; text-shadow: 0 0 10px rgba(255,107,53,0.4); }
  .cash-hud-value.flash-up   { color: #9bffce; }

  .cash-hud-value.bump {
    animation: cashValueBump 0.35s ease;
  }

  @keyframes cashValueBump {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  /* ── floating delta badge ("+$120" / "-$50") ── */
  .cash-delta {
    position: absolute;
    right: 0;
    top: -2px;
    font-size: 13px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
    white-space: nowrap;
    pointer-events: none;
    animation: cashDeltaFloat 1.1s ease-out forwards;
  }

  .cash-delta.gain {
    color: #6fffb0;
    text-shadow: 0 0 10px rgba(60,255,160,0.7);
  }

  .cash-delta.loss {
    color: #ff6b35;
    text-shadow: 0 0 10px rgba(255,107,53,0.7);
  }

  @keyframes cashDeltaFloat {
    0%   { opacity: 0;   transform: translateY(4px)   scale(0.85); }
    15%  { opacity: 1;   transform: translateY(-8px)  scale(1.05); }
    30%  { opacity: 1;   transform: translateY(-14px) scale(1); }
    100% { opacity: 0;   transform: translateY(-46px) scale(0.95); }
  }
</style>
</head>
<body>

    <div class="badge-text">

<!-- ARSENAL (full screen, F4 to toggle) -->
<div id="weapon-menu">
  <div class="arsenal-topbar">
    <div class="menu-title-group">
      <div class="menu-icon"><img src="assets/pistols.png" alt=""></div>
      <div class="menu-title">

<!-- PURCHASE CONFIRM MODAL -->
<div id="confirm-modal">
  <div class="confirm-card">
    <div class="confirm-header">
      <div class="confirm-label">Confirm Purchase</div>
      <div class="confirm-weapon-name" id="confirm-weapon-name">—</div>
    </div>
    <div class="confirm-body">
      <div class="confirm-row">
        <span class="confirm-row-label">Price</span>
        <span class="confirm-row-value price" id="confirm-price">$0</span>
      </div>
      <div class="confirm-row">
        <span class="confirm-row-label">Your balance</span>
        <span class="confirm-row-value" id="confirm-balance">$0</span>
      </div>
      <div class="confirm-divider"></div>
      <div class="confirm-row">
        <span class="confirm-row-label">Balance after</span>
        <span class="confirm-row-value" id="confirm-after">$0</span>
      </div>

        Not enough cash for this weapon yet.
      </div>

    <div class="confirm-actions">
      <button class="confirm-btn confirm-btn-cancel" id="confirm-cancel-btn">
        <span class="confirm-btn-icon">✕</span> Cancel

        <span class="confirm-btn-icon">✓</span> Buy
      </button>
    </div>
  </div>
</div>

<script>
// ── WEAPON DATA ──
const WEAPONS = {
  pistols: [
    { hash: "weapon_badgedeagle",   name: "Badged Eagle", starter: true },
    { hash: "weapon_iceglock",      name: "Ice Glock"       },
    { hash: "weapon_blackiceglock", name: "Black Ice Glock" },
    { hash: "weapon_glock18dt",     name: "Glock 18DT"      },
    { hash: "weapon_nbk",           name: "NBK"             },
    { hash: "weapon_revolver357",   name: "Revolver 357"    },
    { hash: "weapon_glock17s",      name: "Glock 17S"       },
    { hash: "weapon_glock30",       name: "Glock 30"        },
    { hash: "weapon_glock34",       name: "Glock 34"        },
    { hash: "WEAPON_ICEDGLOCK",     name: "Iced Glock"      },
  ],
  smg: [
    { hash: "weapon_crimsonsnowvector", name: "Crimson Snow Vector" },
    { hash: "weapon_blackicemp7",       name: "Black Ice MP7"       },
    { hash: "weapon_p90",               name: "P90"                 },
    { hash: "weapon_spaceflightmp5",    name: "Spaceflight MP5"     },
    { hash: "weapon_blastxspectre",     name: "BlastX Spectre"      },
    { hash: "weapon_candymp5",          name: "Candy MP5"           },
    { hash: "weapon_cx9",               name: "CX-9"                },
    { hash: "weapon_dssmg",             name: "DS SMG"              },
    { hash: "weapon_icevector",         name: "Ice Vector"          },
    { hash: "weapon_mp40type2",         name: "MP40 Type 2"         },
    { hash: "weapon_r99",               name: "R-99"                },
    { hash: "weapon_tbsvector",         name: "TBS Vector"          },
    { hash: "weapon_vesperhybrid",      name: "Vesper Hybrid"       },
    { hash: "weapon_asm1",              name: "ASM1"                },
    { hash: "w_sb_minismg",             name: "Mini SMG Custom"     },
    { hash: "WEAPON_ICEDP90",           name: "Iced P90"            },
  ],
  rifles: [
    { hash: "weapon_m4a1sgyspunkred",   name: "M4A1 Gyspunk Red"  },
    { hash: "weapon_m4hyperbeast",      name: "M4 Hyperbeast"     },
    { hash: "weapon_retrom4a4",         name: "Retro M4A4"        },
    { hash: "weapon_acrcqb",            name: "ACR CQB"           },
    { hash: "weapon_ibak",              name: "IBAK"              },
    { hash: "weapon_minicarbine",       name: "Mini Carbine"      },
    { hash: "weapon_vss",               name: "VSS"               },
    { hash: "WEAPON_ICEDFAL",           name: "Iced FAL"          },
    { hash: "WEAPON_ICEDMZA",           name: "Iced MZA"          },
    { hash: "WEAPON_ICEDR4C",           name: "Iced R4-C"         },
    { hash: "WEAPON_KURONAMIVANDAL",    name: "Kuronami Vandal"   },
    { hash: "WEAPON_ICEDQP12",          name: "Iced QP12"         },
  ],
  misc: [
    { hash: "weapon_hotshotwelder",    name: "Hotshot Welder"   },
    { hash: "weapon_junker",           name: "Junker"           },
    { hash: "weapon_nailgun",          name: "Nailgun"          },
    { hash: "WEAPON_ICEDBONGSHOT",     name: "Iced Bong Shot"   },
  ],
};

const CAT_IMAGES = { pistols: "assets/pistols.png", smg: "assets/smg.png", rifles: "assets/rifles.png", misc: "assets/misc.png" };

// Mirrors prices.lua server-side -- kept in sync manually since this
// is just for display; the server is the real authority on price
// and ownership, this list only controls what the UI shows.
// weapon_badgedeagle is deliberately absent: it's the free starter
// pistol, never purchasable, see prices.lua STARTER_WEAPON.
const WEAPON_PRICES = {
  weapon_glock17s: 1800, weapon_glock30: 2200, weapon_glock34: 2700,
  weapon_nbk: 3200, weapon_revolver357: 3900,
  weapon_glock18dt: 5000, weapon_blackiceglock: 5800, WEAPON_ICEDGLOCK: 6600,
  weapon_iceglock: 7400,
  weapon_cx9: 8500, w_sb_minismg: 9200, weapon_dssmg: 10000, weapon_asm1: 10800,
  weapon_mp40type2: 11600, weapon_r99: 12400, weapon_p90: 13200, weapon_tbsvector: 14000,
  weapon_icevector: 14800, weapon_blastxspectre: 15600, weapon_candymp5: 16400,
  weapon_crimsonsnowvector: 17200, weapon_blackicemp7: 18000, weapon_vesperhybrid: 18500,
  WEAPON_ICEDP90: 19000, weapon_spaceflightmp5: 19500,
  weapon_minicarbine: 12000, weapon_ibak: 14000, weapon_acrcqb: 16500, weapon_vss: 19000,
  weapon_retrom4a4: 21500, weapon_m4hyperbeast: 24000, weapon_m4a1sgyspunkred: 26500,
  WEAPON_ICEDMZA: 28500, WEAPON_ICEDQP12: 30000, WEAPON_ICEDFAL: 31000,
  WEAPON_KURONAMIVANDAL: 31500, WEAPON_ICEDR4C: 32000,
  weapon_nailgun: 2500, weapon_junker: 4200, weapon_hotshotwelder: 6800,
  WEAPON_ICEDBONGSHOT: 11000,
};

const STARTER_WEAPON_HASH = "weapon_badgedeagle";

function getPrice(hash) {
  if (WEAPON_PRICES[hash] !== undefined) return WEAPON_PRICES[hash];
  const lower = hash.toLowerCase();
  for (const k in WEAPON_PRICES) {
    if (k.toLowerCase() === lower) return WEAPON_PRICES[k];
  }
  return 0;
}

function isStarter(hash) {
  return hash.toLowerCase() === STARTER_WEAPON_HASH.toLowerCase();
}

// Build reverse lookup: hash -> category
const WEAPON_CATS = {};
Object.keys(WEAPONS).forEach(cat => {
  WEAPONS[cat].forEach(w => {
    WEAPON_CATS[w.hash.toLowerCase()] = cat;
  });
});

let currentCat   = "pistols";
let activeWeapon = null;
let menuVisible  = false;
let ownedWeapons = {};   // populated via NUI message from client.lua
let balance      = 0;    // live cash balance, populated via NUI message
let pendingPurchase = null; // { hash, name, price } awaiting confirm
let turfBadgeWasVisible = false; // tracks badge/hints/cash-hud state so hideMenu can restore it correctly

const menuEl       = document.getElementById("weapon-menu");
const listEl       = document.getElementById("weapon-list");
const badgeEl      = document.getElementById("turf-badge");
const hintsEl      = document.getElementById("turf-hints");
const badgeNameEl  = document.getElementById("badge-map-name");
const timerValEl   = document.getElementById("badge-timer-val");
const timerDotEl   = document.getElementById("timer-dot");
const footerStatus = document.getElementById("footer-status");
const killFeedEl   = document.getElementById("kill-feed");
const balanceValEl = document.getElementById("balance-value");
const closeBtnEl   = document.getElementById("arsenal-close-btn");

const cashHudEl    = document.getElementById("cash-hud");
const cashHudValEl = document.getElementById("cash-hud-value");
const cashHudPillEl = document.getElementById("cash-hud-pill");
const cashDeltaContainerEl = document.getElementById("cash-delta-container");

const confirmModalEl   = document.getElementById("confirm-modal");
const confirmNameEl    = document.getElementById("confirm-weapon-name");
const confirmPriceEl   = document.getElementById("confirm-price");
const confirmBalanceEl = document.getElementById("confirm-balance");
const confirmAfterEl   = document.getElementById("confirm-after");
const confirmWarningEl = document.getElementById("confirm-warning");
const confirmCancelBtn = document.getElementById("confirm-cancel-btn");
const confirmBuyBtn    = document.getElementById("confirm-buy-btn");

function fmtMoney(n) {
  return "$" + Math.max(0, Math.round(n)).toLocaleString();
}

function isOwned(hash) {
  if (isStarter(hash)) return true; // always owned, free
  if (ownedWeapons[hash]) return true;
  const lower = hash.toLowerCase();
  for (const k in ownedWeapons) {
    if (k.toLowerCase() === lower && ownedWeapons[k]) return true;
  }
  return false;
}

function spawnCashDelta(amount) {
  if (!cashDeltaContainerEl || amount === 0) return;
  const badge = document.createElement("div");
  const isGain = amount > 0;
  badge.className = "cash-delta " + (isGain ? "gain" : "loss");
  badge.textContent = (isGain ? "+" : "-") + "$" + Math.abs(Math.round(amount)).toLocaleString();
  cashDeltaContainerEl.appendChild(badge);
  setTimeout(() => {
    if (badge.parentNode) badge.parentNode.removeChild(badge);
  }, 1150);
}

function setBalance(newBalance) {
  const prev = balance;
  balance = newBalance;
  const delta = newBalance - prev;
  const formatted = fmtMoney(balance);

  balanceValEl.textContent = formatted;
  cashHudValEl.textContent = formatted;

  if (delta !== 0) {
    spawnCashDelta(delta);
    cashHudValEl.classList.remove("bump");
    void cashHudValEl.offsetWidth; // restart animation if it's already running
    cashHudValEl.classList.add("bump");
  }

  if (newBalance < prev) {
    balanceValEl.classList.add("flash-down");
    cashHudValEl.classList.add("flash-down");
    setTimeout(() => {
      balanceValEl.classList.remove("flash-down");
      cashHudValEl.classList.remove("flash-down");
    }, 400);

    if (cashHudPillEl) {
      cashHudPillEl.classList.remove("pulse-up");
      void cashHudPillEl.offsetWidth;
      cashHudPillEl.classList.add("pulse-down");
      setTimeout(() => cashHudPillEl.classList.remove("pulse-down"), 500);
    }
  } else if (newBalance > prev) {
    cashHudValEl.classList.add("flash-up");
    setTimeout(() => cashHudValEl.classList.remove("flash-up"), 400);

    if (cashHudPillEl) {
      cashHudPillEl.classList.remove("pulse-down");
      void cashHudPillEl.offsetWidth;
      cashHudPillEl.classList.add("pulse-up");
      setTimeout(() => cashHudPillEl.classList.remove("pulse-up"), 500);
    }
  }

  if (menuVisible) renderList();
}

function renderList() {
  listEl.innerHTML = "";
  const guns = WEAPONS[currentCat] || [];
  if (guns.length === 0) {
    listEl.innerHTML = `<div class="cat-empty-hint">Nothing here yet.</div>`;
    return;
  }
  guns.forEach(gun => {
    const owned     = isOwned(gun.hash);
    const price     = getPrice(gun.hash);
    const canAfford = balance >= price;

    const btn = document.createElement("button");
    btn.className = "weapon-btn"
      + (activeWeapon === gun.hash ? " active-weapon" : "")
      + (owned ? "" : " locked-weapon");

    let badgeHtml = "";
    if (activeWeapon === gun.hash) {
      badgeHtml = `<span class="weapon-active-badge">EQUIPPED</span>`;
    } else if (!owned) {
      badgeHtml = `<span class="weapon-price${canAfford ? "" : " unaffordable"}">${fmtMoney(price)}</span>`;
    }

    btn.innerHTML = `
      <div class="weapon-icon-slot">
        <img src="${CAT_IMAGES[currentCat] || CAT_IMAGES.misc}" class="weapon-icon-img" alt="">
        ${owned ? "" : '<span class="lock-overlay">🔒</span>'}
      </div>
      <div class="weapon-meta-row">
        <span class="weapon-name">${gun.name}</span>
        ${badgeHtml}
      </div>
    `;
    btn.addEventListener("click", () => onWeaponClick(gun.hash, gun.name, owned, price));
    listEl.appendChild(btn);
  });
}

function onWeaponClick(hash, name, owned, price) {
  if (owned) {
    equipWeapon(hash, name);
  } else {
    openConfirmModal(hash, name, price);
  }
}

function equipWeapon(hash, name) {
  activeWeapon = hash;
  footerStatus.textContent = name.toUpperCase();
  fetch(`https://pvp-turf/turfWeaponSelected`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ hash, name }),
  });
  renderList();
}

// ── PURCHASE CONFIRM MODAL ──

function openConfirmModal(hash, name, price) {
  pendingPurchase = { hash, name, price };
  const after = balance - price;
  const canAfford = after >= 0;

  confirmNameEl.textContent    = name;
  confirmPriceEl.textContent   = fmtMoney(price);
  confirmBalanceEl.textContent = fmtMoney(balance);
  confirmAfterEl.textContent   = canAfford ? fmtMoney(after) : fmtMoney(0);
  confirmAfterEl.classList.toggle("deficit", !canAfford);
  confirmWarningEl.style.display = canAfford ? "none" : "block";
  confirmBuyBtn.classList.toggle("disabled", !canAfford);
  confirmBuyBtn.disabled = !canAfford;

  confirmModalEl.classList.add("visible");
}

function closeConfirmModal() {
  confirmModalEl.classList.remove("visible");
  pendingPurchase = null;
}

confirmCancelBtn.addEventListener("click", closeConfirmModal);

confirmModalEl.addEventListener("click", (e) => {
  // click outside the card = cancel, same as the X button
  if (e.target === confirmModalEl) closeConfirmModal();
});

confirmBuyBtn.addEventListener("click", () => {
  if (!pendingPurchase || confirmBuyBtn.disabled) return;
  const { hash, name } = pendingPurchase;
  footerStatus.textContent = `BUYING ${name.toUpperCase()}...`;
  fetch(`https://pvp-turf/turfWeaponPurchase`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ hash, name }),
  });
  closeConfirmModal();
});

document.querySelectorAll(".menu-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".menu-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentCat = tab.dataset.cat;
    renderList();
  });
});

closeBtnEl.addEventListener("click", () => {
  fetch("https://pvp-turf/closeMenu", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({}),
  });
  hideMenu();
});

function requestBalance() {
  fetch("https://pvp-turf/turfRequestBalance", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({}),
  });
}

function showMenu() {
  menuEl.classList.add("visible");
  hintsEl.classList.remove("visible");
  badgeEl.classList.remove("visible");
  cashHudEl.classList.remove("visible");
  menuVisible = true;
  requestBalance();
  renderList();
}

function hideMenu() {
  menuEl.classList.remove("visible");
  closeConfirmModal();
  menuVisible = false;
  // Restore whichever HUD elements were on before the arsenal opened --
  // turfBadgeWasVisible is set by showTurfBadge/hideTurfBadge so this
  // doesn't accidentally bring the badge back if the player left turf
  // mode entirely while the menu was open.
  if (turfBadgeWasVisible) {
    badgeEl.classList.add("visible");
    hintsEl.classList.add("visible");
    cashHudEl.classList.add("visible");
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function getWeaponIcon(hash) {
  const cat = WEAPON_CATS[(hash || "").toLowerCase()] || "misc";
  return CAT_IMAGES[cat] || CAT_IMAGES.misc;
}

function addKillFeed(killer, victim, weaponHash, headshot) {
  const entry = document.createElement("div");
  entry.className = "kill-entry";
  entry.innerHTML = `
    <span class="kill-killer">${escapeHtml(killer)}</span>
    <img src="${getWeaponIcon(weaponHash)}" class="kill-weapon-img" alt="">
    <span class="kill-victim">${escapeHtml(victim)}</span>
    ${headshot ? '<span class="kill-headshot">💀</span>' : ''}
  `;
  killFeedEl.appendChild(entry);
  setTimeout(() => {
    if (entry.parentNode) entry.parentNode.removeChild(entry);
  }, 5000);
}

window.addEventListener("keydown", (e) => {
  if (e.key === "F4" && menuVisible) {
    fetch("https://pvp-turf/closeMenu", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({}),
    });
    hideMenu();
  }
  if (e.key === "Escape") {
    if (confirmModalEl.classList.contains("visible")) {
      closeConfirmModal();
    } else if (menuVisible) {
      fetch("https://pvp-turf/closeMenu", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
      hideMenu();
    }
  }
});

window.addEventListener("message", (event) => {
  const data = event.data;
  if (!data || !data.type) return;

  switch (data.type) {

    case "toggleWeaponMenu":
      if (menuVisible) hideMenu(); else showMenu();
      break;

    case "closeWeaponMenu":
      hideMenu();
      break;

    case "showTurfBadge":
      turfBadgeWasVisible = true;
      badgeEl.classList.add("visible");
      hintsEl.classList.add("visible");
      cashHudEl.classList.add("visible");
      if (data.mapName)  badgeNameEl.textContent = data.mapName;
      if (data.timerStr) timerValEl.textContent  = data.timerStr;
      requestBalance();
      break;

    case "hideTurfBadge":
      turfBadgeWasVisible = false;
      badgeEl.classList.remove("visible");
      hintsEl.classList.remove("visible");
      cashHudEl.classList.remove("visible");
      hideMenu();
      break;

    case "updateTimer":
      if (data.timerStr) {
        timerValEl.textContent = data.timerStr;
        const secs = data.secondsLeft || 999;
        const warn = secs <= 30;
        timerValEl.classList.toggle("warning", warn);
        timerDotEl.classList.toggle("warning-dot", warn);
      }
      if (data.mapName) badgeNameEl.textContent = data.mapName;
      break;

    case "clearEquipped":
      activeWeapon = null;
      footerStatus.textContent = "READY";
      if (menuVisible) renderList();
      break;

    case "updateOwnedWeapons":
      ownedWeapons = data.owned || {};
      if (menuVisible) renderList();
      break;

    case "updateBalance":
      setBalance(typeof data.balance === "number" ? data.balance : balance);
      break;

    case "purchaseFailed":
      footerStatus.textContent = (data.reasonText || "PURCHASE FAILED").toUpperCase();
      break;

    case "addKillFeed":
      if (data.killer && data.victim) {
        addKillFeed(data.killer, data.victim, data.weaponHash, data.headshot);
      }
      break;
  }
});
</script>
</body>
</html>
