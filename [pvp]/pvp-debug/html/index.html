<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PvP Debug</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    overflow: hidden;
    user-select: none;
  }

  /* ============================================================
     FLYING HUD — small, non-focused, just info. Lives top-left.
     ============================================================ */
  #debug-hud {
    position: fixed;
    top: 18px;
    left: 18px;
    display: none;
    pointer-events: none;
  }
  #debug-hud.visible { display: block; }

  .hud-card {
    background: linear-gradient(150deg, rgba(20,12,36,0.88) 0%, rgba(12,8,22,0.92) 100%);
    border: 1px solid rgba(160,60,255,0.25);
    border-radius: 12px;
    padding: 12px 16px;
    box-shadow: 0 4px 18px rgba(160,60,255,0.15);
    min-width: 200px;
  }

  .hud-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(160,60,255,0.15);
  }

  .hud-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #f0e8ff;
    text-transform: uppercase;
  }

  .hud-count-pill {
    font-size: 11px;
    font-weight: 800;
    color: #6fffb0;
    background: rgba(60,255,160,0.1);
    border: 1px solid rgba(60,255,160,0.3);
    border-radius: 6px;
    padding: 2px 8px;
  }

  .hud-hint { display:flex; align-items:center; gap:8px; font-size:11px; margin-bottom:5px; }
  .hud-hint:last-child { margin-bottom:0; }
  .hud-key {
    font-size: 9.5px;
    font-weight: 700;
    color: #a03cff;
    background: rgba(160,60,255,0.12);
    border: 1px solid rgba(160,60,255,0.3);
    border-radius: 5px;
    padding: 2px 6px;
    min-width: 46px;
    text-align: center;
  }
  .hud-label { color: rgba(220,210,240,0.75); }

  /* ============================================================
     RESULTS MENU — focused, centered, Arsenal-style rounded card
     ============================================================ */
  #debug-results {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
  }
  #debug-results.visible { display: flex; }

  .results-card {
    width: 420px;
    max-width: 90vw;
    border-radius: 14px;
    background: linear-gradient(165deg, rgba(20,12,36,0.97) 0%, rgba(10,6,18,0.98) 100%);
    border: 1px solid rgba(160,60,255,0.35);
    box-shadow: 0 16px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(160,60,255,0.12);
    overflow: hidden;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(160,60,255,0.15);
  }

  .results-title-group { display:flex; flex-direction:column; }
  .results-eyebrow {
    font-size: 9px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    color: rgba(160,60,255,0.75); margin-bottom: 4px;
  }
  .results-title { font-size: 17px; font-weight: 800; color: #f0e8ff; }

  .results-close {
    width: 30px; height: 30px; border-radius: 8px;
    border: 1px solid rgba(160,60,255,0.25);
    background: rgba(160,60,255,0.06);
    color: rgba(220,210,240,0.7);
    font-size: 14px; cursor: pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .results-close:hover { background: rgba(160,60,255,0.16); color:#f0e8ff; }

  .results-list {
    max-height: 320px;
    overflow-y: auto;
    padding: 10px 12px;
  }
  .results-list::-webkit-scrollbar { width: 5px; }
  .results-list::-webkit-scrollbar-thumb { background: rgba(160,60,255,0.35); border-radius: 3px; }

  .marker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 10px;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(160,60,255,0.1);
  }
  .marker-idx {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 7px;
    background: rgba(160,60,255,0.15);
    border: 1px solid rgba(160,60,255,0.3);
    color: #c98bff;
    font-size: 11px; font-weight: 800;
    display:flex; align-items:center; justify-content:center;
  }
  .marker-coords {
    flex: 1;
    font-family: 'SF Mono', 'Segoe UI Mono', monospace;
    font-size: 11.5px;
    color: rgba(226,232,240,0.85);
  }
  .marker-coords b { color: #f0e8ff; }

  .results-empty {
    text-align: center;
    padding: 40px 20px;
    color: rgba(160,60,255,0.4);
    font-size: 12px;
    letter-spacing: 0.3px;
  }

  .results-footer {
    display: flex;
    gap: 10px;
    padding: 16px 20px 20px;
    border-top: 1px solid rgba(160,60,255,0.12);
  }

  .results-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 11px;
    border-radius: 9px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s ease;
  }

  .btn-resume {
    background: rgba(160,60,255,0.1);
    border-color: rgba(160,60,255,0.3);
    color: #e8d8ff;
  }
  .btn-resume:hover { background: rgba(160,60,255,0.18); }

  .btn-clear {
    background: rgba(255,107,53,0.08);
    border-color: rgba(255,107,53,0.25);
    color: #ff8a6b;
  }
  .btn-clear:hover { background: rgba(255,107,53,0.16); }

  .btn-done {
    background: linear-gradient(135deg, #a03cff, #6014c8);
    color: #fff;
    box-shadow: 0 2px 16px rgba(160,60,255,0.4);
  }
  .btn-done:hover { filter: brightness(1.08); }

</style>
<base target="_blank">
</head>
<body>

  <!-- FLYING HUD -->
  <div id="debug-hud">
    <div class="hud-card">
      <div class="hud-title-row">
        <span class="hud-title">PvP Debug</span>
        <span class="hud-count-pill" id="hud-count">0</span>
      </div>
      <div class="hud-hint"><span class="hud-key">WASD</span><span class="hud-label">Fly</span></div>
      <div class="hud-hint"><span class="hud-key">SPACE/CTRL</span><span class="hud-label">Up / Down</span></div>
      <div class="hud-hint"><span class="hud-key">SHIFT</span><span class="hud-label">Fly faster</span></div>
      <div class="hud-hint"><span class="hud-key">E</span><span class="hud-label">Place marker</span></div>
      <div class="hud-hint"><span class="hud-key">BACKSPACE</span><span class="hud-label">Undo last</span></div>
      <div class="hud-hint"><span class="hud-key">F7</span><span class="hud-label">Finish &amp; review</span></div>
    </div>
  </div>

  <!-- RESULTS MENU -->
  <div id="debug-results">
    <div class="results-card">
      <div class="results-header">
        <div class="results-title-group">
          <span class="results-eyebrow">PvP Debug</span>
          <span class="results-title">Saved Spawn Points</span>
        </div>
        <button class="results-close" id="results-close-btn">✕</button>
      </div>

      <div class="results-list" id="results-list"></div>

      <div class="results-footer">
        <button class="results-btn btn-resume" id="btn-resume">↺ Resume</button>
        <button class="results-btn btn-clear" id="btn-clear">Clear All</button>
        <button class="results-btn btn-done" id="btn-done">✓ Done</button>
      </div>
    </div>
  </div>

<script>
  const hudEl       = document.getElementById('debug-hud');
  const hudCountEl  = document.getElementById('hud-count');
  const resultsEl   = document.getElementById('debug-results');
  const listEl      = document.getElementById('results-list');

  function renderList(markers) {
    listEl.innerHTML = '';
    if (!markers || markers.length === 0) {
      listEl.innerHTML = '<div class="results-empty">No markers placed yet — fly around and press E.</div>';
      return;
    }
    markers.forEach((m, i) => {
      const row = document.createElement('div');
      row.className = 'marker-row';
      row.innerHTML = `
        <div class="marker-idx">${i + 1}</div>
        <div class="marker-coords">
          x: <b>${m.x.toFixed(2)}</b>&nbsp;&nbsp;
          y: <b>${m.y.toFixed(2)}</b>&nbsp;&nbsp;
          z: <b>${m.z.toFixed(2)}</b>&nbsp;&nbsp;
          h: <b>${m.heading.toFixed(1)}</b>
        </div>
      `;
      listEl.appendChild(row);
    });
  }

  function post(endpoint, body = {}) {
    fetch(`https://${GetParentResourceName()}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json; charset=UTF-8' },
      body: JSON.stringify(body)
    }).catch(() => {});
  }

  document.getElementById('btn-done').addEventListener('click', () => post('debugDone'));
  document.getElementById('btn-clear').addEventListener('click', () => post('debugClear'));
  document.getElementById('btn-resume').addEventListener('click', () => post('debugResume'));
  document.getElementById('results-close-btn').addEventListener('click', () => post('debugClose'));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && resultsEl.classList.contains('visible')) {
      post('debugClose');
    }
  });

  window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.type) return;

    switch (data.type) {
      case 'showHud':
        hudCountEl.textContent = data.count ?? 0;
        hudEl.classList.add('visible');
        break;

      case 'hideHud':
        hudEl.classList.remove('visible');
        break;

      case 'markerCount':
        hudCountEl.textContent = data.count ?? 0;
        break;

      case 'openResults':
        renderList(data.markers || []);
        resultsEl.classList.add('visible');
        break;

      case 'closeResults':
        resultsEl.classList.remove('visible');
        break;
    }
  });
</script>
</body>
</html>
