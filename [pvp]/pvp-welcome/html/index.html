<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome</title>

<!-- Display + body webfonts. Falls back cleanly to system fonts if the
     NUI browser ever can't reach Google Fonts (e.g. no internet). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent:       #a03cff;
    --accent-glow:  #c98bff;
    --accent-2:     #4ce8ff;   /* cool counter-accent, used sparingly on the rail/dot/divider so it isn't a flat one-note purple wash */
    --text-1:       #f5f0ff;
    --text-2:       rgba(226,232,240,0.68);
    --text-3:       rgba(226,232,240,0.5);
    --font-display: 'Rajdhani', 'Bahnschrift', 'Segoe UI Semibold', system-ui, sans-serif;
    --font-body:    'Inter', 'Segoe UI', system-ui, sans-serif;
    --font-mono:    'SF Mono', 'Segoe UI Mono', monospace;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: var(--font-body);
    user-select: none;
  }

  /* ============================================================
     BACKDROP -- transparent, full viewport, game shows through.
     ============================================================ */
  #backdrop {
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    width: 100vw;
    height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    background: transparent;
    overflow: hidden;
  }
  #backdrop.visible { display: flex; }

  /* ============================================================
     SNOW -- ambient, behind everything, ignores clicks.
     ============================================================ */
  #snow-layer {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .snowflake {
    position: absolute;
    top: -12px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px rgba(255,255,255,0.7);
    animation-name: snowfall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  @keyframes snowfall {
    0%   { transform: translateY(-12px) translateX(0); }
    50%  { transform: translateY(50vh) translateX(var(--drift, 18px)); }
    100% { transform: translateY(112vh) translateX(0); }
  }

  /* ============================================================
     SHELL
     The thing that actually opens/closes (scale+fade). Pure
     layout wrapper -- no background, no border, no clipping --
     so the rail can stick out past the panel's edges freely.
     ============================================================ */
  #shell {
    position: relative;
    z-index: 1;
    display: flex;
    transform: scale(0.94) translateY(16px);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
  }
  #backdrop.show #shell {
    transform: scale(1) translateY(0);
    opacity: 1;
  }

  /* ============================================================
     RAIL -- the signature shape, now a thin glowing edge instead
     of a thick color block. A flagged tip pokes up past the
     panel's top corner; that + the panel's own cut corner is what
     breaks the "centered rectangle" look, without needing width.
     ============================================================ */
  #rail {
    position: absolute;
    top: -22px;
    bottom: 0;
    left: 0;
    width: 9px;
    background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 26%, var(--accent) 84%, #3d1066 100%);
    clip-path: polygon(0 12px, 50% 0, 100% 12px, 100% 100%, 0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 14px;
    filter: drop-shadow(0 0 10px rgba(160,60,255,0.5));
  }
  #rail-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px 2px rgba(255,255,255,0.9);
    animation: dotPulse 2.2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.45; transform: scale(0.85); }
    50%      { opacity: 1;    transform: scale(1.15); }
  }

  /* ============================================================
     PANEL -- the glass surface. Rectangle with ONE corner sliced
     off (top-right) instead of four rounded corners -- that single
     deliberate cut is the thing that makes it not read as a "box".
     ============================================================ */
  #panel {
    position: relative;
    margin-left: 9px;
    width: 640px;
    max-width: calc(92vw - 9px);
    background: linear-gradient(135deg, rgba(13,11,22,0.97) 0%, rgba(25,11,44,0.97) 100%);
    border: 1px solid rgba(160,60,255,0.35);
    clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%, 0 100%);
    filter: drop-shadow(0 14px 50px rgba(0,0,0,0.5)) drop-shadow(0 0 55px rgba(160,60,255,0.2));
  }

  /* the part that actually scrolls -- kept separate from #panel so the
     ribbon (which intentionally hangs past the right edge) never has
     to share an overflow setting with the scrolling content. that
     mismatch (overflow-x:visible next to overflow-y:auto) is what
     was forcing a sideways scrollbar to appear. */
  #panel-scroll {
    max-height: 88vh;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 34px 36px 30px;
  }

  /* faint scanline texture -- ties the panel to a HUD/terminal feel */
  #panel::before {
    content: "";
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    pointer-events: none;
    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay;
    opacity: 0.6;
  }

  #panel-scroll::-webkit-scrollbar { width: 6px; }
  #panel-scroll::-webkit-scrollbar-thumb { background: rgba(160,60,255,0.35); border-radius: 4px; }
  #panel-scroll::-webkit-scrollbar-track { background: transparent; }

  .reveal { opacity: 0; transform: translateY(10px); animation: revealUp 0.4s ease forwards; }
  @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }

  /* small flat badge -- lives in the header now, fully inside the
     box. The previous version draped a rotated ribbon across the
     panel's cut corner, but that meant it overlapped the exact
     region clip-path excludes -- which is what was getting trimmed. */
  .beta-tag {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #0b0614;
    background: linear-gradient(90deg, var(--accent), var(--accent-glow));
    padding: 3px 10px;
    margin-left: 10px;
    vertical-align: middle;
    border-radius: 2px;
    box-shadow: 0 2px 10px rgba(160,60,255,0.4);
  }

  /* ============================================================
     CLOSE BUTTON
     ============================================================ */
  #close-btn {
    position: absolute;
    top: 22px;
    right: 18px;
    width: 28px;
    height: 28px;
    clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 0 100%);
    border: 1px solid rgba(160,60,255,0.25);
    background: rgba(160,60,255,0.06);
    color: rgba(220,210,240,0.7);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s ease;
  }
  #close-btn:hover {
    background: rgba(160,60,255,0.18);
    border-color: rgba(160,60,255,0.55);
    color: #f0e8ff;
  }
  #close-btn:focus-visible,
  #discord-btn:focus-visible,
  #accept-btn:focus-visible {
    outline: 2px solid var(--accent-glow);
    outline-offset: 2px;
  }

  /* ============================================================
     HEADER
     ============================================================ */
  #header { animation-delay: 0.05s; position: relative; padding-right: 50px; }

  #server-name {
    font-family: var(--font-display);
    font-size: 31px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-1);
    letter-spacing: 0.5px;
    text-shadow: 0 0 22px rgba(160,60,255,0.45);
    line-height: 1.15;
  }

  #title-sweep {
    width: 64px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2), rgba(76,232,255,0));
    margin-top: 12px;
    transform: scaleX(0);
    transform-origin: left;
    animation: sweepIn 0.5s ease forwards;
    animation-delay: 0.35s;
  }
  @keyframes sweepIn { to { transform: scaleX(1); } }

  #tagline {
    margin-top: 12px;
    font-family: var(--font-body);
    font-size: 13.5px;
    color: var(--text-2);
    line-height: 1.5;
  }

  /* ============================================================
     SECTION LABEL -- a small flagged chip + trailing hairline,
     instead of plain uppercase text. Echoes the rail's flag cut
     at a much smaller scale so the language stays consistent.
     ============================================================ */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 26px 0 12px;
  }
  .label-chip {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-glow);
    padding: 4px 12px 4px 16px;
    background: linear-gradient(90deg, rgba(160,60,255,0.2), rgba(160,60,255,0.05));
    border-left: 2px solid var(--accent);
    clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%);
    white-space: nowrap;
  }
  .label-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(160,60,255,0.45), transparent);
  }

  /* ============================================================
     MODE CARDS -- responsive grid, each with a small matching
     top-right nick so the shape language carries all the way down.
     ============================================================ */
  #modes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
  }
  .mode-card {
    background: rgba(160,60,255,0.05);
    border: 1px solid rgba(160,60,255,0.18);
    border-left: 3px solid var(--accent);
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
    padding: 14px 16px;
  }
  .mode-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: #f0e8ff;
    margin-bottom: 5px;
  }
  .mode-desc {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.5;
  }
  .mode-card.ghost {
    background: transparent;
    border: 1px dashed rgba(160,60,255,0.25);
    border-left: 1px dashed rgba(160,60,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .mode-card.ghost .mode-desc {
    font-family: var(--font-display);
    color: rgba(160,60,255,0.6);
    font-weight: 700;
    font-size: 11.5px;
    letter-spacing: 0.5px;
  }

  /* ============================================================
     COMMANDS
     ============================================================ */
  #commands {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    column-gap: 24px;
    row-gap: 4px;
  }
  .cmd-row { display: flex; align-items: baseline; gap: 14px; padding: 7px 4px; }
  .cmd-name {
    flex-shrink: 0;
    width: 78px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(160,60,255,0.4);
  }
  .cmd-desc { font-family: var(--font-body); font-size: 12.5px; color: var(--text-2); }

  /* ============================================================
     FOOTER -- angular buttons (cut top-left corner) instead of
     rounded rectangles, matching the panel's own facet direction.
     ============================================================ */
  #footer { margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }

  #accept-btn {
    width: 100%;
    padding: 14px 0;
    background: var(--accent);
    border: 1px solid var(--accent);
    clip-path: polygon(16px 0, 100% 0, 100% 100%, 0 100%, 0 16px);
    color: #0b0614;
    font-family: var(--font-display);
    font-size: 14.5px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  #accept-btn:hover {
    background: var(--accent-glow);
    border-color: var(--accent-glow);
    filter: drop-shadow(0 0 22px rgba(160,60,255,0.45));
  }

  #discord-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px 0;
    background: transparent;
    border: 1px solid rgba(160,60,255,0.4);
    clip-path: polygon(16px 0, 100% 0, 100% 100%, 0 100%, 0 16px);
    color: var(--text-1);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  #discord-btn:hover { background: rgba(160,60,255,0.12); border-color: rgba(160,60,255,0.7); }
  #discord-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ============================================================
     ACCESSIBILITY
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    #shell { transition: opacity 0.2s ease; transform: none !important; }
    #rail-dot, #title-sweep, .reveal {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
    #snow-layer { display: none !important; }
  }
</style>
</head>
<body>

  <div id="backdrop">
    <div id="snow-layer"></div>

    <div id="shell">
      <div id="rail">
        <div id="rail-dot"></div>
      </div>

      <div id="panel">
        <button id="close-btn" title="Close (ESC)">✕</button>

        <div id="panel-scroll">
          <div id="header" class="reveal">
            <div id="server-name"><span id="server-name-text">Server Name</span><span class="beta-tag">Beta</span></div>
            <div id="title-sweep"></div>
            <div id="tagline">Tagline goes here</div>
          </div>

          <div class="section-label reveal" style="animation-delay:0.10s;">
            <span class="label-chip">Game Modes</span><span class="label-line"></span>
          </div>
          <div id="modes" class="reveal" style="animation-delay:0.10s;"></div>

          <div class="section-label reveal" style="animation-delay:0.17s;">
            <span class="label-chip">Commands</span><span class="label-line"></span>
          </div>
          <div id="commands" class="reveal" style="animation-delay:0.17s;"></div>

          <div id="footer" class="reveal" style="animation-delay:0.24s;">
            <button id="accept-btn" type="button">Accept</button>
            <a id="discord-btn" href="#" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.369a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .078.009c.12.099.246.198.373.292a.077.077 0 0 1-.006.128 12.3 12.3 0 0 1-1.873.891.076.076 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.029 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.029ZM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.094 2.157 2.42 0 1.333-.955 2.418-2.157 2.418Zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.094 2.157 2.42 0 1.333-.946 2.418-2.157 2.418Z"/></svg>
              <span id="discord-label">discord.gg/yourcode</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const backdrop  = document.getElementById('backdrop');
  const shell     = document.getElementById('shell');
  const closeBtn  = document.getElementById('close-btn');
  let closeTimer  = null;

  // ----------------------------------------------------------
  // SNOW -- generate once, animations sit idle while the
  // backdrop is display:none and cost nothing until shown.
  // ----------------------------------------------------------
  function spawnSnow(count) {
    const layer = document.getElementById('snow-layer');
    if (!layer) return;
    for (let i = 0; i < count; i++) {
      const flake = document.createElement('div');
      flake.className = 'snowflake';
      const size     = (Math.random() * 3 + 1.5).toFixed(1);
      const left     = (Math.random() * 100).toFixed(2);
      const duration = (Math.random() * 9 + 7).toFixed(2);
      const delay    = (Math.random() * -16).toFixed(2);
      const drift    = (Math.random() * 40 - 20).toFixed(1);
      const opacity  = (Math.random() * 0.5 + 0.35).toFixed(2);
      flake.style.width             = `${size}px`;
      flake.style.height            = `${size}px`;
      flake.style.left              = `${left}%`;
      flake.style.opacity           = opacity;
      flake.style.animationDuration = `${duration}s`;
      flake.style.animationDelay    = `${delay}s`;
      flake.style.setProperty('--drift', `${drift}px`);
      layer.appendChild(flake);
    }
  }
  spawnSnow(45);

  function postClose() {
    fetch(`https://${GetParentResourceName()}/closeWelcome`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json; charset=UTF-8' },
      body: JSON.stringify({})
    }).catch(() => {});
  }

  function closeUI() {
    backdrop.classList.remove('show');
    clearTimeout(closeTimer);
    closeTimer = setTimeout(() => {
      backdrop.classList.remove('visible');
    }, 280);
    postClose();
  }

  function renderModes(modes) {
    const el = document.getElementById('modes');
    el.innerHTML = '';
    (modes || []).forEach(m => {
      const div = document.createElement('div');
      div.className = 'mode-card';
      div.innerHTML = `<div class="mode-title">${m.title}</div><div class="mode-desc">${m.desc}</div>`;
      el.appendChild(div);
    });
    const ghost = document.createElement('div');
    ghost.className = 'mode-card ghost';
    ghost.innerHTML = `<div class="mode-desc">+ MORE ON THE WAY</div>`;
    el.appendChild(ghost);
  }

  function renderCommands(commands) {
    const el = document.getElementById('commands');
    el.innerHTML = '';
    (commands || []).forEach(c => {
      const div = document.createElement('div');
      div.className = 'cmd-row';
      const label = c.key || c.cmd;
      div.innerHTML = `<div class="cmd-name">${label}</div><div class="cmd-desc">${c.desc}</div>`;
      el.appendChild(div);
    });
  }

  function openUI(config) {
    document.getElementById('server-name-text').textContent = config.serverName || 'Server';
    document.getElementById('tagline').textContent     = config.tagline || '';
    document.getElementById('discord-label').textContent = config.discordLabel || config.discordUrl || '';
    document.getElementById('discord-btn').href        = config.discordUrl || '#';

    renderModes(config.modes);
    renderCommands(config.commands);

    backdrop.classList.add('visible');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => backdrop.classList.add('show'));
    });
  }

  window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.action) return;

    if (data.action === 'open') {
      openUI(data.config || {});
    } else if (data.action === 'close') {
      closeUI();
    }
  });

  closeBtn.addEventListener('click', closeUI);
  document.getElementById('accept-btn').addEventListener('click', closeUI);

  // Discord button -- plain <a target="_blank"> does NOT open the
  // system browser inside FiveM's NUI. invokeNative('openUrl', ...)
  // is the real fix. Falls back to window.open outside the game.
  document.getElementById('discord-btn').addEventListener('click', (e) => {
    e.preventDefault();
    const url = e.currentTarget.href;
    if (!url || url === '#') return;
    try {
      window.invokeNative('openUrl', url);
    } catch (err) {
      window.open(url, '_blank');
    }
  });

  // click outside the whole shell (rail + panel) closes it
  backdrop.addEventListener('mousedown', (e) => {
    if (!shell.contains(e.target)) closeUI();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && backdrop.classList.contains('visible')) {
      closeUI();
    }
  });
</script>
</body>
</html>
